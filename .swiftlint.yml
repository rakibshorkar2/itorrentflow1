disabled_rules:
  - trailing_whitespace
  - line_length
  - function_body_length
  - type_body_length
  - file_length

opt_in_rules:
  - empty_count
  - closure_spacing
  - overridden_super_call
  - redundant_nil_coalescing

identifier_name:
  min_length: 2
  excluded:
    - id
    - ip
    - to
    - dl
    - ul

type_name:
  min_length: 3

reporter: "xcode"
