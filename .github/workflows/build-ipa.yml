name: Build Unsigned IPA

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  SCHEME: iTorrentFlow
  CONFIGURATION: Release
  DERIVED_DATA: ${{ github.workspace }}/DerivedData
  ARCHIVE_PATH: ${{ github.workspace }}/build/iTorrentFlow.xcarchive
  IPA_PATH: ${{ github.workspace }}/build/iTorrentFlow.ipa

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Downgrade Xcode project format for compatibility
        run: |
          python3 -c "
          import os
          path = 'iTorrentFlow.xcodeproj/project.pbxproj'
          if os.path.exists(path):
              with open(path, 'r') as f:
                  c = f.read()
              c = c.replace('objectVersion = 77;', 'objectVersion = 56;')
              c = c.replace('objectVersion = 60;', 'objectVersion = 56;')
              c = c.replace('compatibilityVersion = \"Xcode 16.0\"', 'compatibilityVersion = \"Xcode 15.0\"')
              with open(path, 'w') as f:
                  f.write(c)
              print('Project downgraded to Xcode 15 format successfully.')
          else:
              print('Error: project.pbxproj not found!')
          "

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme ${{ env.SCHEME }} \
            -derivedDataPath ${{ env.DERIVED_DATA }}

      - name: Install xcpretty
        run: gem install xcpretty --quiet

      - name: Build app (unsigned)
        run: |
          xcodebuild \
            -scheme ${{ env.SCHEME }} \
            -configuration ${{ env.CONFIGURATION }} \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath ${{ env.DERIVED_DATA }} \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Package unsigned IPA
        run: |
          set -e
          echo "=== Searching for .app bundles in DerivedData ==="
          find ${{ env.DERIVED_DATA }} -name "*.app" 2>/dev/null || true
          echo "=== Products directory ==="
          find ${{ env.DERIVED_DATA }}/Build/Products -maxdepth 3 2>/dev/null || true
          
          # Find the main app (exclude extensions, test runners)
          APP_PATH=$(find ${{ env.DERIVED_DATA }}/Build/Products \
            -name "iTorrentFlow.app" \
            -not -name "*.appex" \
            -maxdepth 4 \
            2>/dev/null | head -1)
          
          # Fallback: broader search
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ${{ env.DERIVED_DATA }} \
              -name "iTorrentFlow.app" \
              -not -path "*/PackageFrameworks/*" \
              -not -name "*.appex" \
              2>/dev/null | head -1)
          fi
          
          echo "App path: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: iTorrentFlow.app not found!"
            find ${{ env.DERIVED_DATA }} -name "*.app" 2>/dev/null || true
            exit 1
          fi
          
          mkdir -p ${{ github.workspace }}/build/Payload
          cp -r "$APP_PATH" ${{ github.workspace }}/build/Payload/iTorrentFlow.app
          
          cd ${{ github.workspace }}/build
          zip -r iTorrentFlow.ipa Payload/
          echo "IPA created successfully"
          ls -lh iTorrentFlow.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: iTorrentFlow-unsigned-${{ github.sha }}
          path: ${{ env.IPA_PATH }}
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: ${{ env.DERIVED_DATA }}/Logs/
          retention-days: 7

  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging || true
